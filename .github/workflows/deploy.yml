name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    needs: []   # add: [lint, test] once CI is green end-to-end
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/stocksignal

            echo "==> Pulling latest code"
            git pull origin main

            echo "==> Backend: install dependencies"
            source .venv/bin/activate
            pip install -r requirements.txt -q

            echo "==> Backend: run migrations"
            export $(grep -v '^#' .env | xargs)
            export PYTHONPATH=/opt/stocksignal/src
            alembic upgrade head

            echo "==> Frontend: install & build"
            cd frontend
            npm ci --prefer-offline
            npm run build
            cd ..

            echo "==> Restarting services"
            sudo systemctl restart stocksignal-backend
            sudo systemctl restart stocksignal-frontend

            echo "==> Done"
