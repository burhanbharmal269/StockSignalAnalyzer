services:
  backend:
    build:
      context: .
      target: runtime
    image: stocksignalanalyzer:dev
    container_name: ssa_backend
    environment:
      - ENVIRONMENT=development
      - DEBUG=true
      - LOG_LEVEL=DEBUG
      - LOG_FORMAT=console
      - API_HOST=0.0.0.0
      - API_PORT=8000
    expose:
      - "8000"
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src:ro
      - ./config:/app/config:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: ssa-frontend:dev
    container_name: ssa_frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost
      - NEXT_PUBLIC_WS_URL=ws://localhost
      - BACKEND_URL=http://backend:8000
    expose:
      - "3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: ssa_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  # -----------------------------------------------------------------------
  # Future services — uncomment as phases are implemented
  # -----------------------------------------------------------------------
  # db:                   (Phase 4 — TimescaleDB)
  # redis:                (Phase 4 — Redis)
  # pgbouncer:            (Phase 4 — connection pooler)
