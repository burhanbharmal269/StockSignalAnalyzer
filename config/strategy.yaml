version: "1.1"   # bumped: research-calibrated weights (2026-06-18)
                  # Sources: deep-research-report.md (intraday indicators),
                  #          deep-research-report(1).md (NIFTY/BANKNIFTY options strategy)

# ---------------------------------------------------------------------------
# Base weights per scoring component (total = 100)
# Source: docs/19_STRATEGY_FRAMEWORK.md, docs/16_SIGNAL_SCORING_ENGINE.md
# NOTE: Base weights must match component _MAX_WEIGHT constants in Python code.
# ---------------------------------------------------------------------------
weights:
  base:
    OI_BUILDUP: 25
    TREND: 20
    OPTION_CHAIN: 20
    VOLUME: 15
    VWAP: 10
    SENTIMENT: 5
    IV_ANALYSIS: 5

  # Regime multipliers applied to base weights before score aggregation.
  # Effective weight = base × multiplier; denominator is sum of all eff-weights.
  # Research basis per regime noted below each table.
  regime_multipliers:

    # -----------------------------------------------------------------------
    # TRENDING_BULLISH / TRENDING_BEARISH
    # Research: VWAP Sharpe 2.1 in trend-follow (Report 1 §VWAP).
    #           Intraday momentum — "first-hour return predicts end-of-day" (Report 1 §momentum).
    #           OFI/volume confirms trend continuation (Report 1 §Order-Flow).
    #           IV less relevant in strong directional move (option premiums follow price).
    # -----------------------------------------------------------------------
    TRENDING_BULLISH:
      OI_BUILDUP: 1.15    # OI buildup confirms trend direction — slightly lower than before
      TREND: 1.40         # ADX+EMA+Supertrend most reliable signal in trend (was 1.30)
      OPTION_CHAIN: 0.85  # OI walls still useful but trend overrides them (was 1.00)
      VOLUME: 1.25        # OFI research: volume surge confirms trend (was 1.10)
      VWAP: 1.50          # #1 intraday signal per research — price > VWAP = strong long bias (was 1.10)
      SENTIMENT: 0.40     # Always neutral (NeutralProvider) — minimize noise contribution (was 1.00)
      IV_ANALYSIS: 0.45   # IV regime less critical when price is trending strongly (was 0.70)

    TRENDING_BEARISH:
      OI_BUILDUP: 1.15    # OI buildup confirms bearish trend — slightly lower than before
      TREND: 1.40         # Same as bullish — momentum continuation (was 1.30)
      OPTION_CHAIN: 0.95  # Put OI walls matter slightly more in bear trend (was 1.10)
      VOLUME: 1.25        # Volume confirms bearish moves too (was 1.10)
      VWAP: 1.50          # Price < VWAP = strong short bias per research (was 1.10)
      SENTIMENT: 0.40     # Minimize neutral noise (was 1.20)
      IV_ANALYSIS: 0.50   # IV less critical when price is trending (was 1.10)

    # -----------------------------------------------------------------------
    # SIDEWAYS — Iron Condor / Mean-Reversion territory
    # Research: "Only when NIFTY trading in a range and VIX low (<12)" (Report 2 §Iron Condor).
    #           VWAP as mean-reversion anchor: "price oscillates around VWAP" (Report 1 §VWAP).
    #           OI walls (OPTION_CHAIN) define the range ceiling/floor (Report 2 §Iron Condor).
    #           IV regime determines whether to sell premium (Report 2 §IV/VIX context).
    # -----------------------------------------------------------------------
    SIDEWAYS:
      OI_BUILDUP: 1.10    # Max pain and OI wall gravity matter in range (was 1.00)
      TREND: 0.25         # ADX gate makes trend near-zero in sideways — keep low
      OPTION_CHAIN: 1.60  # OI walls + PCR + IV skew define range edges (was 1.40)
      VOLUME: 1.00        # Volume confirms reversals at range boundaries
      VWAP: 1.55          # Mean-reversion anchor — research confirms VWAP as equilibrium (was 1.30)
      SENTIMENT: 0.40     # Minimize neutral noise (was 1.00)
      IV_ANALYSIS: 1.65   # Sell-premium opportunity in low-IV sideways; VIX gate critical (was 1.40)

    # -----------------------------------------------------------------------
    # HIGH_VOLATILITY — Panic / Spike regime
    # Research: "Short vol dangerous in fear zone — VIX > 20 → avoid selling options" (Report 2).
    #           "IV_ANALYSIS VIX structural penalty" protects from selling in fear.
    #           Volume spike confirms direction in vol events (Report 1 §OFI).
    #           VWAP unreliable in panic gaps (Report 1: "high-vol days, price moves fast").
    # -----------------------------------------------------------------------
    HIGH_VOLATILITY:
      OI_BUILDUP: 0.70    # OI data unreliable in panic — gaps distort change_in_oi (was 0.80)
      TREND: 0.50         # Trend flips fast in vol spikes — reduce weight (was 0.60)
      OPTION_CHAIN: 1.50  # IV skew and GEX most important — tells who is in control (was 1.25)
      VOLUME: 1.20        # Volume surge confirms direction in vol spike (OFI research) (was 1.00)
      VWAP: 0.55          # VWAP unreliable — price gaps past it in panic (was 0.70)
      SENTIMENT: 0.40     # Minimize neutral noise (was 1.20)
      IV_ANALYSIS: 1.90   # MOST CRITICAL: VIX penalty fires here; HV/IV ratio determines strategy (was 1.60)

    # -----------------------------------------------------------------------
    # LOW_VOLATILITY — Iron Condor prime territory
    # Research: "Iron condor when VIX < 12, stable range, low premiums" (Report 2).
    #           "Low IV → buy premium if directional; sell premium if neutral" (Report 2 §IV).
    #           VWAP highly reliable in low-vol oscillation (Report 1 §VWAP).
    # -----------------------------------------------------------------------
    LOW_VOLATILITY:
      OI_BUILDUP: 1.00    # OI reliable in calm markets (was 0.90)
      TREND: 0.60         # Low vol = low ADX typically; TREND adds little (was 0.70)
      OPTION_CHAIN: 1.45  # OI walls define trading range — critical for condor range (was 1.10)
      VOLUME: 1.00        # Normal volume in low-vol regime (was 0.90)
      VWAP: 1.30          # Very reliable in low-vol — price oscillates cleanly around VWAP (was 0.80)
      SENTIMENT: 0.40     # Minimize neutral noise (was 1.00)
      IV_ANALYSIS: 1.80   # Low IV = buy premium; IV percentile dictates strategy (was 1.60)

# ---------------------------------------------------------------------------
# Signal execution gates
# ---------------------------------------------------------------------------
gates:
  min_score_to_execute: 70
  min_confidence_to_execute: 65
  data_completeness_min_pct: 60.0   # 5 of 7 components sufficient — OI_BUILDUP and OPTION_CHAIN unavailable without live market data
  direction_conviction_min: 0.50    # raised from 0.45: research win rates (65-70%) demand clear conviction

# ---------------------------------------------------------------------------
# Component 1 — OI Build-up (max 25 pts)
# Source: docs/21_SIGNAL_ENGINE.md Component 1
# ---------------------------------------------------------------------------
oi_buildup:
  # Thresholds to classify quadrant
  oi_change_strong_pct: 1.8         # lowered from 2.0: more sensitive to early OI accumulation
  price_change_min_pct: 0.25        # lowered from 0.3: catch smaller but confirmed price moves

  # Score formula multipliers
  long_oi_multiplier: 1.8
  long_price_multiplier: 2.0
  covering_oi_multiplier: 1.0
  covering_price_multiplier: 1.5

  # Score caps per quadrant type
  max_strong_score: 25.0
  max_weak_score: 15.0
  ambiguous_floor: 3.0  # reduced from 8.0: ambiguous OI should not score high

  # OFI confluence bonus — when BOTH OI quadrant AND PCR confirm the same direction,
  # institutions are stacking evidence from two independent flows (price/OI + options market).
  # Research: dual confirmation materially improves win rate in NSE F&O positional setups.
  ofi_bullish_pcr_min: 1.0   # Long Build-up + PCR >= this = institutions hedging = confluence
  ofi_bearish_pcr_max: 0.9   # Short Build-up + PCR <= this = call euphoria = confluence
  ofi_confluence_bonus: 3.0  # pts added to winning side when OI + PCR confirm direction

  # PCR adjustments
  pcr_bullish_low: 0.7
  pcr_bullish_high: 1.0
  pcr_strong_bullish: 1.3
  pcr_adjustment_against: -2.0
  pcr_adjustment_with: 2.0
  pcr_adjustment_strong: 3.0

  # FII net position adjustment
  fii_net_threshold_contracts: 5000
  fii_adjustment: 2.0

  # Max pain distance adjustment
  max_pain_distance_pct: 1.0
  max_pain_adjustment: 2.0
  dte_max_pain_dominant: 3

# ---------------------------------------------------------------------------
# Component 2 — Trend Following (max 20 pts)
# Source: docs/21_SIGNAL_ENGINE.md Component 2
# ---------------------------------------------------------------------------
trend:
  # ADX gate — HARD GATE: ADX below this returns 0 regardless of direction
  adx_gate: 15.0

  # ADX score tiers (Step 1)
  adx_weak: 25.0
  adx_moderate: 28.0
  adx_strong: 32.0
  adx_very_strong: 36.0
  adx_score_gate_to_weak: 8.0
  adx_score_weak_to_moderate: 12.0
  adx_score_moderate_to_strong: 16.0
  adx_score_strong_to_very_strong: 18.0
  adx_score_very_strong: 20.0

  # DI spread thresholds (Step 2)
  di_spread_no_signal: 5.0
  di_spread_moderate: 10.0
  di_spread_strong: 15.0
  di_spread_score_moderate: 3.0
  di_spread_score_strong: 5.0
  di_spread_score_very_strong: 7.0

  # EMA alignment scores (Step 3)
  ema_full_alignment_score: 5.0
  ema_partial_20_50_score: 2.0
  ema_partial_20_200_score: 1.0

  # Supertrend (Step 4)
  supertrend_score: 3.0

  # Multi-timeframe confirmation (Step 5)
  mtf_3_of_4_score: 3.0
  mtf_2_of_4_score: 1.0

  # RSI gate (Step 6)
  rsi_long_min: 45.0
  rsi_long_max: 75.0
  rsi_short_min: 25.0
  rsi_short_max: 55.0
  rsi_gate_score: 1.0

# ---------------------------------------------------------------------------
# Component 3 — Option Chain Analysis (max 20 pts)
# Source: docs/21_SIGNAL_ENGINE.md Component 3
# ---------------------------------------------------------------------------
option_chain:
  # IV Percentile scoring for LONG signal (Step 1)
  iv_long_tier_1_max: 20.0
  iv_long_tier_2_max: 40.0
  iv_long_tier_3_max: 60.0
  iv_long_tier_4_max: 75.0
  iv_long_score_tier_1: 6.0
  iv_long_score_tier_2: 4.0
  iv_long_score_tier_3: 3.0
  iv_long_score_tier_4: 1.0
  iv_long_score_tier_5: 0.0

  # IV Percentile scoring for SHORT signal (Step 1)
  iv_short_tier_1_max: 30.0
  iv_short_tier_2_max: 55.0
  iv_short_tier_3_max: 70.0
  iv_short_score_tier_1: 2.0
  iv_short_score_tier_2: 4.0
  iv_short_score_tier_3: 6.0
  iv_short_score_tier_4: 8.0

  # IV Skew (Step 2)
  iv_skew_threshold: 1.0
  iv_skew_score: 2.0

  # GEX (Step 3)
  gex_aligned_score: 2.0
  gex_against_score: -1.0
  gex_squeeze_score: 2.0

  # OI Wall Proximity (Step 4)
  oi_wall_close_pct: 0.5
  oi_wall_medium_pct: 1.0
  oi_wall_far_pct: 2.0
  oi_wall_close_score: -3.0
  oi_wall_medium_score: 0.0
  oi_wall_far_score: 2.0
  oi_wall_very_far_score: 3.0

  # PCR Direction Trend (Step 5)
  pcr_trend_confirms_score: 2.0
  pcr_trend_against_score: -1.0

# ---------------------------------------------------------------------------
# Component 4 — Volume Analysis (max 15 pts)
# Source: docs/21_SIGNAL_ENGINE.md Component 4
# ---------------------------------------------------------------------------
volume:
  # Volume ratio tiers (Step 1)
  volume_ratio_tier_1: 0.5
  volume_ratio_tier_2: 1.0
  volume_ratio_tier_3: 1.5
  volume_ratio_tier_4: 2.0
  volume_ratio_score_1: 3.0
  volume_ratio_score_2: 6.0
  volume_ratio_score_3: 9.0
  volume_ratio_score_4: 12.0
  volume_ratio_score_5: 15.0

  # Volume divergence penalty (Step 2)
  divergence_penalty: 5.0

  # OBV confirmation (Step 3)
  obv_confirms_score: 2.0
  obv_against_score: -2.0

  # Cumulative delta (Step 4)
  delta_confirms_score: 2.0
  delta_against_score: -2.0

  # VPOC proximity (Step 5)
  vpoc_threshold_pct: 0.2
  vpoc_bonus: 1.0

# ---------------------------------------------------------------------------
# Component 5 — VWAP Analysis (max 10 pts)
# Source: docs/21_SIGNAL_ENGINE.md Component 5
# Research: VWAP is #1 intraday signal (Sharpe 2.1). Mode B scores raised to
#           reflect research-backed strength of VWAP position in trending markets.
# ---------------------------------------------------------------------------
vwap:
  # Mode A thresholds (SIDEWAYS and HIGH_VOLATILITY regime — mean reversion)
  mode_a_extreme_sigma: 1.5
  mode_a_strong_sigma: 1.0
  mode_a_moderate_sigma: 0.5
  mode_a_score_extreme: 10.0
  mode_a_score_strong: 7.0
  mode_a_score_moderate: 4.0

  # Volume and RSI gates for Mode A
  mode_a_volume_ratio_extreme: 1.5
  mode_a_volume_ratio_strong: 1.2
  mode_a_rsi_long_extreme: 35.0
  mode_a_rsi_long_strong: 45.0
  mode_a_rsi_long_moderate: 50.0
  mode_a_rsi_short_extreme: 65.0
  mode_a_rsi_short_strong: 55.0
  mode_a_rsi_short_moderate: 50.0

  # VWAP touch count degradation — each revisit weakens the signal
  touch_count_multiplier_0: 1.00
  touch_count_multiplier_1: 0.88  # slightly less degradation (was 0.85) — first bounce still strong
  touch_count_multiplier_2: 0.70
  touch_count_multiplier_3_plus: 0.50

  # Mode B thresholds (TRENDING regime — trend-follow)
  # Research: "price above VWAP = buy signal; VWAP bounce in trend = highest confidence"
  mode_b_score_bouncing: 10.0     # Bounce off VWAP in trend direction — max score (unchanged)
  mode_b_score_above_only: 7.0    # Price above VWAP (LONG) without bounce — raised from 6.0
  mode_b_score_caution: 2.0       # Price on wrong side — caution signal
  mode_b_bounce_proximity_sigma: 0.35  # "Near VWAP" threshold slightly wider (was 0.3)

# ---------------------------------------------------------------------------
# Component 6 — Sentiment Analysis (max 5 pts)
# Source: docs/21_SIGNAL_ENGINE.md Component 6
# NOTE: NeutralSentimentProvider always returns score=50 → 2.5 pts each side.
#       Real impact is minimized via regime multipliers (0.40 everywhere).
# ---------------------------------------------------------------------------
sentiment:
  neutral_score: 50
  max_weight: 5

  strongly_bullish_min: 80
  bullish_min: 60
  neutral_min: 40
  bearish_min: 20

  strongly_bullish_long_score: 5.0
  strongly_bullish_short_score: 0.0
  bullish_long_score: 4.0
  bullish_short_score: 1.0
  neutral_long_score: 2.5
  neutral_short_score: 2.5
  bearish_long_score: 1.0
  bearish_short_score: 4.0
  strongly_bearish_long_score: 0.0
  strongly_bearish_short_score: 5.0

  max_age_minutes: 60

# ---------------------------------------------------------------------------
# Component 7 — IV Analysis (max 5 pts)
# Source: docs/21_SIGNAL_ENGINE.md Component 7
# Research: "Only enter iron condor when VIX < 12" (Report 2 §Iron Condor).
#           HV/IV > 1.1 = options measurably cheap → buy premium (was 1.2).
# ---------------------------------------------------------------------------
iv_analysis:
  # LONG vol signal scoring (buy premium — low IV is good)
  iv_buy_percentile_max: 20.0
  iv_buy_score_max: 5.0
  iv_buy_percentile_mid: 35.0
  iv_buy_score_mid: 3.0
  iv_buy_percentile_low: 50.0
  iv_buy_score_low: 1.0

  # SHORT vol signal scoring (sell premium — high IV is good)
  iv_sell_percentile_min: 70.0
  iv_sell_score_max: 5.0
  iv_sell_percentile_mid: 55.0
  iv_sell_score_mid: 3.0
  iv_sell_percentile_low: 40.0
  iv_sell_score_low: 1.0

  # HV/IV ratio bonuses
  # Research: options "measurably cheap" when HV > IV by 10%+ — lowered threshold from 1.2
  hv_iv_ratio_buy_threshold: 1.10   # HV > IV by 10% → options cheap → buy vol (was 1.2)
  hv_iv_ratio_sell_threshold: 0.80  # HV < IV → options expensive → sell vol (unchanged)
  hv_iv_bonus: 2.0

  # VIX penalty for short vol (India VIX > 20 = elevated fear zone)
  # Research: "avoid selling straddle when VIX is high — tail risk huge" (Report 2 §short straddle)
  vix_high_threshold: 20.0          # India VIX threshold (unchanged — calibrated for NSE range)
  vix_short_vol_penalty: 2.0
