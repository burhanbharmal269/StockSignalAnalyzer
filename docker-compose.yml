services:
  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------

  postgres:
    image: postgres:15-alpine
    container_name: ssa_postgres
    environment:
      POSTGRES_USER: trading
      POSTGRES_PASSWORD: trading
      POSTGRES_DB: trading
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trading -d trading"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ssa_redis
    command: redis-server --save "" --appendonly no
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Application
  # ---------------------------------------------------------------------------

  backend:
    build:
      context: .
      target: runtime
    image: stocksignalanalyzer:dev
    container_name: ssa_backend
    env_file:
      - .env
    environment:
      - ENVIRONMENT=development
      - DEBUG=true
      - LOG_LEVEL=DEBUG
      - LOG_FORMAT=console
      - API_HOST=0.0.0.0
      - API_PORT=8000
      # Public frontend origin — used for server-side redirects (e.g. Kite OAuth
      # callback). Set FRONTEND_URL in .env for real deployments.
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      # Override localhost URLs to point at docker service names
      - DATABASE_WRITE_URL=postgresql+asyncpg://trading:trading@postgres:5432/trading
      - DATABASE_READ_URL=postgresql+asyncpg://trading:trading@postgres:5432/trading
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src:ro
      - ./config:/app/config
      - ./alembic:/app/alembic:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BACKEND_URL: http://backend:8000
    image: ssa-frontend:dev
    container_name: ssa_frontend
    environment:
      # Server-side (SSR/API routes): uses internal Docker service name.
      # Browser-side API/WS URLs are NOT set here — NEXT_PUBLIC_* vars are
      # inlined at `npm run build` time, not read at container runtime, so
      # setting them here would have no effect. The frontend instead derives
      # the API/WS host from window.location.hostname at runtime (see
      # frontend/src/lib/constants.ts), so it works from any VM IP/domain
      # without a rebuild.
      - BACKEND_URL=http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
