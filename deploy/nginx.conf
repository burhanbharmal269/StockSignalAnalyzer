# WebSocket connection upgrade map
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}
# Production nginx config for stocks.kutubkhan.com
# Place at /etc/nginx/sites-available/stocks and symlink to sites-enabled/
# Assumes certbot has already provisioned SSL certs.
#
# Routing:
#   /ws   → backend:8000 (WebSocket upgrade)
#   /api/ → backend:8000 (HTTP proxy)
#   /     → frontend:3000 (Next.js)

server {
    listen 80;
    server_name stocks.kutubkhan.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name stocks.kutubkhan.com;

    ssl_certificate     /etc/letsencrypt/live/stocks.kutubkhan.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stocks.kutubkhan.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10M;

    # WebSocket — must come before the catch-all /
    location /ws {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    # Backend API
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # FastAPI docs (remove in production if not needed)
    location /docs {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
    }

    # Frontend (Next.js)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
