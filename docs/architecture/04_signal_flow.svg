<svg viewBox="0 0 1100 1700" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',Arial,sans-serif">
<defs>
  <marker id="arr" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
    <polygon points="0 0,9 3.5,0 7" fill="#475569"/>
  </marker>
  <marker id="arrG" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
    <polygon points="0 0,9 3.5,0 7" fill="#22c55e"/>
  </marker>
  <marker id="arrB" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
    <polygon points="0 0,9 3.5,0 7" fill="#3b82f6"/>
  </marker>
  <marker id="arrO" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
    <polygon points="0 0,9 3.5,0 7" fill="#f59e0b"/>
  </marker>
  <marker id="arrR" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
    <polygon points="0 0,9 3.5,0 7" fill="#ef4444"/>
  </marker>
</defs>

<rect width="1100" height="1700" fill="#0d1117"/>

<!-- Title -->
<text x="550" y="38" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="700">Signal Generation Flow</text>
<text x="550" y="58" text-anchor="middle" fill="#64748b" font-size="12">Tick-to-Order Pipeline · NSE FnO · Async AI Decoupled</text>

<!-- ── Stage 1: Market Data ── -->
<rect x="300" y="75" width="500" height="60" rx="10" fill="#1e2d3d" stroke="#3b82f6" stroke-width="2"/>
<text x="550" y="101" text-anchor="middle" fill="#93c5fd" font-size="14" font-weight="700">Kite WebSocket (KiteTicker)</text>
<text x="550" y="121" text-anchor="middle" fill="#64748b" font-size="11">Binary tick stream · 3000 instruments · FULL mode for FnO · QUOTE for indices</text>

<line x1="550" y1="135" x2="550" y2="158" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrB)"/>

<!-- Stage 2: WebSocket Manager -->
<rect x="300" y="160" width="500" height="55" rx="10" fill="#1e2d3d" stroke="#3b82f6" stroke-width="1.5"/>
<text x="550" y="183" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="600">WebSocket Manager</text>
<text x="550" y="200" text-anchor="middle" fill="#64748b" font-size="11">Normalize tick → TickEvent (Decimal prices, UTC timestamps, OI)</text>

<!-- Event label -->
<rect x="560" y="217" width="220" height="22" rx="4" fill="#1a2030" stroke="#3b82f6" stroke-width="1"/>
<text x="670" y="232" text-anchor="middle" fill="#60a5fa" font-size="10" font-weight="600">market_data.tick.received</text>
<line x1="550" y1="215" x2="550" y2="253" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrB)"/>

<!-- Stage 3: Candle Aggregator (side) -->
<rect x="800" y="230" width="270" height="50" rx="8" fill="#1a1f2e" stroke="#475569" stroke-width="1.2"/>
<text x="935" y="251" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600">Candle Aggregator</text>
<text x="935" y="267" text-anchor="middle" fill="#64748b" font-size="10">1m·5m·15m·1h boundaries</text>
<line x1="800" y1="255" x2="790" y2="255" stroke="#475569" stroke-width="1.2"/>
<line x1="782" y1="255" x2="700" y2="270" stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>
<text x="740" y="245" fill="#475569" font-size="10">fan-out</text>

<!-- Stage 3: Feature Engineering -->
<rect x="300" y="255" width="500" height="75" rx="10" fill="#14301e" stroke="#22c55e" stroke-width="1.5"/>
<text x="550" y="278" text-anchor="middle" fill="#86efac" font-size="13" font-weight="600">Feature Engineering Service</text>
<text x="550" y="295" text-anchor="middle" fill="#64748b" font-size="11">RSI · EMA(9,21,50,200) · MACD · ATR · ADX · SuperTrend · VWAP · BB</text>
<text x="550" y="312" text-anchor="middle" fill="#64748b" font-size="11">PCR · Max Pain · OI Build-Up · IV Rank · IV Percentile · Rel Volume</text>
<text x="550" y="325" text-anchor="middle" fill="#1f6630" font-size="10">Incremental computation · O(1) per tick · Multi-timeframe: 15m · 1h · Daily</text>

<rect x="560" y="332" width="240" height="22" rx="4" fill="#1a2030" stroke="#22c55e" stroke-width="1"/>
<text x="680" y="347" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="600">features.technical.computed</text>
<line x1="550" y1="330" x2="550" y2="368" stroke="#22c55e" stroke-width="2" marker-end="url(#arrG)"/>

<!-- Stage 4: Regime Engine -->
<rect x="300" y="370" width="500" height="60" rx="10" fill="#14301e" stroke="#22c55e" stroke-width="1.5"/>
<text x="550" y="393" text-anchor="middle" fill="#86efac" font-size="13" font-weight="600">Regime Detection Engine</text>
<text x="550" y="413" text-anchor="middle" fill="#64748b" font-size="11">TRENDING_BULLISH · TRENDING_BEARISH · SIDEWAYS · HIGH_VOL · LOW_VOL</text>

<rect x="560" y="432" width="220" height="22" rx="4" fill="#1a2030" stroke="#22c55e" stroke-width="1"/>
<text x="670" y="447" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="600">features.regime.detected</text>
<line x1="550" y1="430" x2="550" y2="468" stroke="#22c55e" stroke-width="2" marker-end="url(#arrG)"/>

<!-- Async AI Branch -->
<rect x="800" y="370" width="270" height="100" rx="8" fill="#1a1020" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="6,3"/>
<text x="935" y="393" text-anchor="middle" fill="#d8b4fe" font-size="11" font-weight="600">AI Sentiment (Async)</text>
<text x="935" y="410" text-anchor="middle" fill="#64748b" font-size="10">NewsPoller → IAIProvider</text>
<text x="935" y="425" text-anchor="middle" fill="#64748b" font-size="10">OpenAI gpt-4o-mini</text>
<text x="935" y="442" text-anchor="middle" fill="#64748b" font-size="10">→ Redis cache (1h TTL)</text>
<text x="935" y="458" text-anchor="middle" fill="#64748b" font-size="10">Fallback: NeutralProvider</text>
<line x1="800" y1="420" x2="790" y2="420" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="4,3"/>
<line x1="782" y1="420" x2="700" y2="470" stroke="#a855f7" stroke-width="1" stroke-dasharray="4,3"/>
<text x="745" y="415" fill="#a855f7" font-size="9">async cache</text>

<!-- Stage 5: Strategy Evaluator -->
<rect x="300" y="470" width="500" height="80" rx="10" fill="#14301e" stroke="#22c55e" stroke-width="1.5"/>
<text x="550" y="493" text-anchor="middle" fill="#86efac" font-size="13" font-weight="600">Strategy Evaluator × 5  (parallel)</text>
<rect x="320" y="503" width="88" height="30" rx="5" fill="#0f2018" stroke="#22c55e" stroke-width="1"/>
<text x="364" y="522" text-anchor="middle" fill="#86efac" font-size="10">Momentum</text>
<rect x="417" y="503" width="88" height="30" rx="5" fill="#0f2018" stroke="#22c55e" stroke-width="1"/>
<text x="461" y="522" text-anchor="middle" fill="#86efac" font-size="10">Breakout</text>
<rect x="514" y="503" width="88" height="30" rx="5" fill="#0f2018" stroke="#22c55e" stroke-width="1"/>
<text x="558" y="522" text-anchor="middle" fill="#86efac" font-size="10">Trend Follow</text>
<rect x="611" y="503" width="88" height="30" rx="5" fill="#0f2018" stroke="#22c55e" stroke-width="1"/>
<text x="655" y="522" text-anchor="middle" fill="#86efac" font-size="10">OI Analysis</text>
<rect x="708" y="503" width="72" height="30" rx="5" fill="#0f2018" stroke="#22c55e" stroke-width="1"/>
<text x="744" y="522" text-anchor="middle" fill="#86efac" font-size="10">VWAP</text>

<rect x="560" y="553" width="235" height="22" rx="4" fill="#1a2030" stroke="#22c55e" stroke-width="1"/>
<text x="678" y="568" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="600">signal.strategy.evaluated × N</text>
<line x1="550" y1="550" x2="550" y2="590" stroke="#22c55e" stroke-width="2" marker-end="url(#arrG)"/>

<!-- Stage 6: Scoring Engine -->
<rect x="300" y="592" width="500" height="80" rx="10" fill="#1e2530" stroke="#f59e0b" stroke-width="1.5"/>
<text x="550" y="615" text-anchor="middle" fill="#fde68a" font-size="13" font-weight="600">Scoring Engine</text>
<text x="550" y="633" text-anchor="middle" fill="#64748b" font-size="11">Regime-conditional weights · Trend·OI·Volume·PriceAction·IV·Sentiment·Regime</text>
<text x="550" y="650" text-anchor="middle" fill="#64748b" font-size="11">Score = 0–100 · Weight version hash stored · Explainability JSONB</text>

<rect x="560" y="675" width="220" height="22" rx="4" fill="#1a2030" stroke="#f59e0b" stroke-width="1"/>
<text x="670" y="690" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="600">signal.score.computed</text>
<line x1="550" y1="672" x2="550" y2="710" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrO)"/>

<!-- Stage 7: Confidence Engine -->
<rect x="300" y="712" width="500" height="65" rx="10" fill="#1e2530" stroke="#f59e0b" stroke-width="1.5"/>
<text x="550" y="735" text-anchor="middle" fill="#fde68a" font-size="13" font-weight="600">Confidence Engine</text>
<text x="550" y="753" text-anchor="middle" fill="#64748b" font-size="11">Win Rate · Regime Match · Data Completeness · Loss Streak → Confidence %</text>
<text x="550" y="769" text-anchor="middle" fill="#64748b" font-size="11">Min confidence 65% to execute · Below threshold → REJECTED</text>

<rect x="560" y="780" width="235" height="22" rx="4" fill="#1a2030" stroke="#f59e0b" stroke-width="1"/>
<text x="678" y="795" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="600">signal.confidence.computed</text>
<line x1="550" y1="777" x2="550" y2="815" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrO)"/>

<!-- Stage 8: Strike Selector -->
<rect x="300" y="817" width="500" height="65" rx="10" fill="#1e2a1e" stroke="#22c55e" stroke-width="1.5"/>
<text x="550" y="840" text-anchor="middle" fill="#86efac" font-size="13" font-weight="600">Strike Selector  (FnO only)</text>
<text x="550" y="858" text-anchor="middle" fill="#64748b" font-size="11">Expiry selection: DTE ≥ 7 · Strike: delta-target (ATM or 1-2 OTM)</text>
<text x="550" y="874" text-anchor="middle" fill="#64748b" font-size="11">OI liquidity check ≥ 500 lots · Bid-ask spread &lt; 1% premium</text>

<line x1="550" y1="882" x2="550" y2="910" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>

<!-- Stage 9: Risk Engine -->
<rect x="300" y="912" width="500" height="105" rx="10" fill="#2d1515" stroke="#ef4444" stroke-width="2"/>
<text x="550" y="933" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="700">Risk Engine — 15 Pre-Trade Checks</text>
<text x="340" y="952" fill="#ef4444" font-size="10">① Kill Switch  ② Daily Loss  ③ Weekly Loss</text>
<text x="340" y="967" fill="#ef4444" font-size="10">④ Max Drawdown  ⑤ Open Positions  ⑥ Symbol Concentration</text>
<text x="340" y="982" fill="#ef4444" font-size="10">⑦ Capital Concentration  ⑧ Net Delta  ⑨ Correlation</text>
<text x="340" y="997" fill="#ef4444" font-size="10">⑩ Margin  ⑪ Risk-Reward  ⑫ Position Size  ⑬ Order Rate</text>
<text x="340" y="1012" fill="#ef4444" font-size="10">⑭ Theta Decay (warn)  ⑮ Net Vega — P99 SLO &lt; 200ms</text>

<!-- Rejected branch -->
<rect x="850" y="940" width="220" height="45" rx="8" fill="#2d1515" stroke="#ef4444" stroke-width="1.5"/>
<text x="960" y="960" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="600">REJECTED</text>
<text x="960" y="977" text-anchor="middle" fill="#64748b" font-size="10">reason code · audit record</text>
<line x1="800" y1="958" x2="850" y2="958" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrR)"/>
<text x="825" y="952" fill="#ef4444" font-size="9">FAIL</text>

<rect x="560" y="1020" width="220" height="22" rx="4" fill="#1a2030" stroke="#ef4444" stroke-width="1"/>
<text x="670" y="1035" text-anchor="middle" fill="#f87171" font-size="10" font-weight="600">signal.risk.approved</text>
<line x1="550" y1="1017" x2="550" y2="1055" stroke="#ef4444" stroke-width="2" marker-end="url(#arrR)"/>

<!-- Stage 10: OMS -->
<rect x="300" y="1057" width="500" height="60" rx="10" fill="#1e2530" stroke="#06b6d4" stroke-width="1.5"/>
<text x="550" y="1080" text-anchor="middle" fill="#a5f3fc" font-size="13" font-weight="600">Order Management System (OMS)</text>
<text x="550" y="1098" text-anchor="middle" fill="#64748b" font-size="11">Kill switch gate · Rate limiter · Order builder · Broker normalization</text>

<line x1="550" y1="1117" x2="550" y2="1148" stroke="#06b6d4" stroke-width="2" marker-end="url(#arr)"/>

<!-- Stage 11: Broker Adapter -->
<rect x="300" y="1150" width="500" height="55" rx="10" fill="#1e2530" stroke="#fb923c" stroke-width="1.5"/>
<text x="550" y="1173" text-anchor="middle" fill="#fdba74" font-size="13" font-weight="600">Broker Adapter  (IBroker)</text>
<text x="550" y="1191" text-anchor="middle" fill="#64748b" font-size="11">KiteBroker · place_order() · MIS / NRML / CNC product type mapping</text>

<line x1="550" y1="1205" x2="550" y2="1238" stroke="#fb923c" stroke-width="2" marker-end="url(#arr)"/>

<!-- Stage 12: Exchange -->
<rect x="320" y="1240" width="460" height="55" rx="10" fill="#1a1a2e" stroke="#818cf8" stroke-width="1.5"/>
<text x="550" y="1263" text-anchor="middle" fill="#c7d2fe" font-size="13" font-weight="600">NSE Exchange  (NFO Segment)</text>
<text x="550" y="1281" text-anchor="middle" fill="#64748b" font-size="11">Order matching · Confirmation · Fill at market or limit price</text>

<line x1="550" y1="1295" x2="550" y2="1328" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>

<!-- Stage 13: Post-trade -->
<rect x="300" y="1330" width="500" height="65" rx="10" fill="#141e2a" stroke="#475569" stroke-width="1.5"/>
<text x="550" y="1353" text-anchor="middle" fill="#94a3b8" font-size="13" font-weight="600">Post-Trade Processing</text>
<text x="550" y="1371" text-anchor="middle" fill="#64748b" font-size="11">order.filled → PositionService · Greeks update · MTM P&amp;L</text>
<text x="550" y="1387" text-anchor="middle" fill="#64748b" font-size="11">RiskEngine refresh · Notification sent · Analytics written</text>

<line x1="550" y1="1395" x2="550" y2="1428" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>

<!-- Stage 14: Analytics + Dashboard -->
<rect x="300" y="1430" width="500" height="55" rx="10" fill="#141a1e" stroke="#475569" stroke-width="1.5"/>
<text x="550" y="1453" text-anchor="middle" fill="#94a3b8" font-size="13" font-weight="600">Analytics + Dashboard</text>
<text x="550" y="1471" text-anchor="middle" fill="#64748b" font-size="11">P&amp;L attribution · Slippage · Signal accuracy · Portfolio Greeks display</text>

<!-- Latency budget annotation -->
<rect x="30" y="1510" width="1040" height="160" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
<text x="550" y="1530" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="700">End-to-End Latency Budget</text>
<line x1="60" y1="1540" x2="1040" y2="1540" stroke="#30363d" stroke-width="1"/>
<text x="70" y="1558" fill="#64748b" font-size="11">Tick received → Feature computed:</text>
<text x="450" y="1558" fill="#22c55e" font-size="11" font-weight="600">&lt; 500ms</text>
<text x="70" y="1575" fill="#64748b" font-size="11">Feature computed → Strategy evaluated:</text>
<text x="450" y="1575" fill="#22c55e" font-size="11" font-weight="600">&lt; 200ms</text>
<text x="70" y="1592" fill="#64748b" font-size="11">Strategy evaluated → Risk decision:</text>
<text x="450" y="1592" fill="#22c55e" font-size="11" font-weight="600">&lt; 300ms</text>
<text x="70" y="1609" fill="#64748b" font-size="11">Risk approved → Broker confirmed:</text>
<text x="450" y="1609" fill="#22c55e" font-size="11" font-weight="600">&lt; 500ms</text>
<text x="70" y="1630" fill="#64748b" font-size="11" font-weight="700">Total tick → broker (P99 SLO):</text>
<text x="450" y="1630" fill="#f59e0b" font-size="11" font-weight="700">&lt; 2 seconds</text>
<text x="600" y="1558" fill="#64748b" font-size="11">AI sentiment runs async, feeds cache only</text>
<text x="600" y="1575" fill="#64748b" font-size="11">Scoring engine reads cached sentiment (≤ 1ms)</text>
<text x="600" y="1592" fill="#64748b" font-size="11">Neutral fallback if cache empty (confidence degraded)</text>
<text x="600" y="1609" fill="#64748b" font-size="11">Risk check includes real-time margin API call</text>
</svg>
